<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta de Amor</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
  <div id="contenedor-carta">
    <header>Para el amor de mi vida 🌸</header>

    <div id="menu-capitulos">
      <p>Nuestra historia en fragmentos...</p>
      <div class="grid-botones">
        <button class="btn-capitulo" data-target="cap1">Capítulo I</button>
        <button class="btn-capitulo" data-target="cap2">Capítulo II</button>
        <button class="btn-capitulo" data-target="cap3">Capítulo III</button>
        <button class="btn-capitulo" data-target="cap4">Capítulo IV</button>
        <button class="btn-capitulo" data-target="cap5" style="background-color: #ff4081;">Capítulo V 💖</button>
      </div>
    </div>

    <section id="cap1" class="capitulo-seccion">
      <h2>El Comienzo ✨</h2>
      <p>Desde que llegaste a mi vida...</p>
      <img src="static/img/foto_1.png" alt="Foto 1">
      <button class="btn-volver">Regresar</button>
    </section>

    <section id="cap2" class="capitulo-seccion">
      <h2>Lo que siento 🌹</h2>
      <img src="static/img/2.png" alt="Elias">
      <button class="btn-volver">Regresar</button>
    </section>

    <section id="cap3" class="capitulo-seccion">
      <h2>Mi Promesa ♾️</h2>
      <p>Prometo caminar contigo...</p>
      <button class="btn-volver">Regresar</button>
    </section>

    <section id="cap4" class="capitulo-seccion">
      <h2>Tu Licencia 📜</h2>
      <div class="formulario-licencia">
        <input type="text" id="input-yo" placeholder="Yo...">
        <input type="text" id="input-pareja" placeholder="Mi pareja...">
        <input type="text" id="input-firma" placeholder="Firma...">
      </div>
      <div class="licencia-visual">
        <img src="static/img/Licencia_h.png" class="img-licencia">
        <div class="capas-texto">
          <span id="txt-yo" class="overlay-text"></span>
          <span id="txt-pareja" class="overlay-text"></span>
          <span id="txt-firma" class="overlay-text"></span>
        </div>
      </div>
      <button class="btn-volver">Regresar</button>
    </section>

    <section id="cap5" class="capitulo-seccion">
      <h2>Mi Sorpresa ✨</h2>
      <p>"Yo también soy tuya..."</p>
      <div class="contenedor-licencia-final">
        <img src="static/img/Licencia_m.png" alt="Sorpresa">
      </div>
      <button class="btn-volver">Regresar</button>
    </section>

    <footer>Te amo siempre</footer>
    <div id="contenedor-musica">
      <iframe id="musica-fondo" src="" frameborder="0" allow="autoplay"></iframe>
    </div>
  </div>
  <script src="static/js/efectos.js"></script>
</body>
</html>
